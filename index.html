<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Quotations</title>
  </head>
  <body>
    <h1>Mes citations</h1>
    <h2>Gestionnaire de citations en ligne</h2>
    <h3 id="count">0 citation</h3>
    <hr />
    <form action="" id="citationForm">
      <label for="citationInput" id="citationLabel">Citation</label>
      <input type="text" id="citationInput" />
      <label for="authorInput" id="authorLabel">Autrice/Auteur</label>
      <input type="text" id="authorInput" />
      <button type="submit">Submit</button>
    </form>
    <div id="quote-list">
      <div class="quote">
        <p class="text">🗨️ "On ne naît pas femme, on le devient."</p>
        <p class="author">🐰 Simone de Beauvoir</p>
      </div>
    </div>
    <!-- <button id="clearQuotes">Supprimer les citations</button> -->
  </body>
  <script src="script.js"></script>
</html>
